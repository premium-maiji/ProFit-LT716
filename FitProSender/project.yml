name: FitProSender
options:
  minimumXcodeGenVersion: 2.41.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  FitProSender:
    type: application
    platform: iOS
    sources:
      - path: FitProSender
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.fitprosender
        PRODUCT_NAME: FitProSender
        INFOPLIST_FILE: FitProSender/Info.plist
        CODE_SIGN_STYLE: Automatic
